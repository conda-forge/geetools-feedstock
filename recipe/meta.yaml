{% set name = "geetools" %}
{% set version = "1.18.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/geetools-{{ version }}.tar.gz
  sha256: 5ba0fe49efcbff3f45cbb552c90d2a9060cbb5853fe41cd61753124ba79870e6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - earthengine-api >=1.6.12
    - requests
    - pandas
    - geopandas
    - deprecated
    - xee >=0.0.11
    - yamlable
    - matplotlib-base
    - anyascii
    - ee-extra

test:
  imports:
    - geetools
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: A collection of tools to work with Google Earth Engine Python API
  license: MIT
  license_file: LICENSE
  home: https://geetools.readthedocs.io

extra:
  recipe-maintainers:
    - 12rambau
    - fitoprincipe
