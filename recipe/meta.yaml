{% set name = "geetools" %}
{% set version = "1.18.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/geetools-{{ version }}.tar.gz
  sha256: cf26699552bd3dc0d2b8527479f6a14da38b10050346d830b2bb68e23d4657dc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - earthengine-api >=1.6.12
    - requests
    - pandas
    - geopandas
    - deprecated
    - xee >=0.0.11
    - yamlable
    - matplotlib-base
    - anyascii

test:
  imports:
    - geetools
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: A collection of tools to work with Google Earth Engine Python API
  license: MIT
  license_file: LICENSE
  home: https://geetools.readthedocs.io

extra:
  recipe-maintainers:
    - 12rambau
    - fitoprincipe
